name: Build and publish app release

on:
  release:
      types: [published]

env:
  APP_NAME: news

permissions: {}

jobs:
  build_and_publish:
    environment: release
    runs-on: ubuntu-latest
    name: "Release: build, sign and upload the app"
    permissions:
      contents: write
    strategy:
      matrix:
        php-versions: ['8.3']
        nextcloud: ['stable34']
        database: ['sqlite']
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate release tag matches app version
        run: |
          APP_VERSION="$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' appinfo/info.xml | head -n 1)"

          if [[ -z "$APP_VERSION" ]]; then
            echo "::error title=Unable to read app version::Could not find a <version> value in appinfo/info.xml."
            exit 1
          fi

          if [[ "$GITHUB_REF_NAME" != "$APP_VERSION" ]]; then
            echo "::error title=Release tag/version mismatch::Release tag '$GITHUB_REF_NAME' does not match appinfo/info.xml version '$APP_VERSION'. Update appinfo/info.xml before publishing this release."
            exit 1
          fi

          echo "Release tag matches appinfo/info.xml version: $APP_VERSION"

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: pdo_sqlite,pdo_mysql,pdo_pgsql,gd,zip
          coverage: none

      - name: Set up server non MySQL
        uses: SMillerDev/nextcloud-actions/setup-nextcloud@b13a04eb6a4e48972d31fa07559619843fcc2102 # main
        with:
          cron: false
          version: ${{ matrix.nextcloud }}
          database-type: ${{ matrix.database }}

      - name: Prime app build
        run: make

      - name: Configure server with app
        uses: SMillerDev/nextcloud-actions/setup-nextcloud-app@b13a04eb6a4e48972d31fa07559619843fcc2102 # main
        with:
          app: ${{ env.APP_NAME }}
          check-code: false

      - name: Create signed release archive
        run: |
          cd ../server/apps/${{ env.APP_NAME }} && make appstore
        env:
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          app_public_crt: ${{ secrets.APP_PUBLIC_CRT }}

      - name: Upload app tarball to release
        id: attach_to_release
        run: |
          gh release upload "$RELEASE_TAG" \
            ../server/apps/${{ env.APP_NAME }}/build/artifacts/appstore/${{ env.APP_NAME }}.tar.gz \
            --clobber
          echo "browser_download_url=https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/${{ env.APP_NAME }}.tar.gz" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload app to Nextcloud appstore
        uses: R0Wi/nextcloud-appstore-push-action@ad2020a77eb694e8fe145d2ebd6bc21c246240fd #v1.0.5
        with:
          app_name: ${{ env.APP_NAME }}
          appstore_token: ${{ secrets.APPSTORE_TOKEN }}
          download_url: ${{ steps.attach_to_release.outputs.browser_download_url }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          nightly: false

      - name: Delete crt and key from local storage
        run: rm -f ~/.nextcloud/certificates/*
