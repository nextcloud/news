name: Static analysis
on:
  pull_request

permissions: {}
jobs:
  static-phpstan-analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      matrix:
        php-versions: ['8.2', '8.3' ]
        nextcloud: [ 'stable34' ]
        database: [ 'sqlite' ]
        include:
          - php-versions: 8.3
            nextcloud: pre-release
            database: sqlite
            experimental: true
          - php-versions: 8.4
            nextcloud: pre-release
            database: sqlite
            experimental: true
    name: "phpstan: Nextcloud ${{ matrix.nextcloud }} with ${{ matrix.php-versions }}"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up php
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: pdo_sqlite,pdo_mysql,pdo_pgsql,gd,zip
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up server non MySQL
        uses: SMillerDev/nextcloud-actions/setup-nextcloud@b13a04eb6a4e48972d31fa07559619843fcc2102 # main
        with:
          cron: true
          version: ${{ matrix.nextcloud }}
          database-type: ${{ matrix.database }}

      - name: Build app
        run: make composer

      - name: Configure server with app
        uses: SMillerDev/nextcloud-actions/setup-nextcloud-app@b13a04eb6a4e48972d31fa07559619843fcc2102 # main
        with:
          app: 'news'
          check-code: false
          force: true

      - name: Prep code scanning
        working-directory: ../server/apps/news
        run: make php-test-dependencies

      - name: PHPCS
        working-directory: ../server/apps/news
        run: make phpcs

      - name: PHPStan
        working-directory: ../server/apps/news
        run: make phpstan
